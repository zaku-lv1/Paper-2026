<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>銀鏡反応シミュレーション</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>銀鏡反応シミュレーション</h1>

<div class="stats">
    <div>経過時間: <span id="timer" class="val">0.00</span> s</div>
    <div>透過率: <span id="trans" class="val">100.0</span> %</div>
    <div>残存Ag⁺: <span id="agCount" class="val">150</span></div>
    <div>析出開始(シミュ): <span id="startTime" class="val">—</span> s</div>
    <div>実験値(参考): <span id="expTime" class="val">—</span> s</div>
    <div>状態: <span id="status" class="val">待機中</span></div>
</div>

<div class="main">
    <div class="panel">
        <div>粒子運動と銀析出</div>
        <canvas id="simCanvas" width="420" height="420"></canvas>
        <div class="desc">青: 銀イオン / 赤: 還元剤 / 白: 析出銀</div>
    </div>

    <div class="panel">
        <div>透過率変化</div>
        <canvas id="graphCanvas" width="420" height="420"></canvas>
        <div class="desc">透過率(%) vs 経過時間(s)</div>
    </div>
</div>

<div class="controls">
    <div class="control-group">
        <label>還元剤濃度</label>
        <input type="range" id="conc" min="0.01" max="0.10" step="0.01" value="0.04">
        <div><span id="concVal">0.04</span> mol/L</div>
    </div>

    <div class="control-group">
        <label>還元剤の種類</label>
        <select id="agent">
            <option value="0.25" data-agent="glucose">グルコース</option>
            <option value="1.5" data-agent="acetaldehyde">アセトアルデヒド</option>
            <option value="3.0" data-agent="formaldehyde">ホルムアルデヒド</option>
        </select>
    </div>

    <button id="startBtn">シミュレーション開始</button>
    <button id="resetBtn">リセット</button>
</div>

<script type="module" src="./js/main.js"></script>

</body>
</html>
