<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>銀鏡反応シミュレーション</title>

<style>
:root{
    --bg:#121212;
    --panel:#232323;
    --text:#f0f0f0;
    --blue:#00d9ff;
    --red:#ff5a36;
    --green:#55dd77;
}

body{
    margin:0;
    padding:20px;
    background:var(--bg);
    color:var(--text);
    font-family:"Segoe UI",sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{ margin-bottom:10px; }

.main{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.panel{
    background:var(--panel);
    padding:15px;
    border-radius:14px;
    box-shadow:0 0 12px rgba(0,0,0,0.5);
}

canvas{
    background:black;
    border:1px solid #555;
    border-radius:10px;
}

.stats{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:20px;
    background:var(--panel);
    padding:15px;
    border-radius:12px;
    width:900px;
    max-width:95%;
}

.val{
    color:var(--blue);
    font-family:monospace;
    font-size:1.1rem;
}

.controls{
    margin-top:20px;
    width:900px;
    max-width:95%;
    background:var(--panel);
    padding:20px;
    border-radius:12px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.control-group{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.desc{
    font-size:0.85rem;
    color:#bbbbbb;
    line-height:1.5;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

#startBtn{ background:var(--green); color:white; }
#startBtn:hover{ opacity:0.85; }

#resetBtn{ background:#e74c3c; color:white; }
#resetBtn:hover{ opacity:0.85; }

input[type="range"]{ width:100%; }

select{
    padding:8px;
    border-radius:6px;
    background:#333;
    color:white;
    border:none;
}

@media(max-width:800px){
    .controls{ grid-template-columns:1fr; }
}
</style>
</head>

<body>

<h1>銀鏡反応シミュレーション</h1>

<div class="stats">
    <div>経過時間: <span id="timer" class="val">0.00</span> s</div>
    <div>透過率: <span id="trans" class="val">100.0</span> %</div>
    <div>残存Ag⁺: <span id="agCount" class="val">150</span></div>
    <div>析出開始(シミュ): <span id="startTime" class="val">—</span> s</div>
    <div>実験値(参考): <span id="expTime" class="val">—</span> s</div>
    <div>状態: <span id="status" class="val">待機中</span></div>
</div>

<div class="main">
    <div class="panel">
        <div>粒子運動と銀析出</div>
        <canvas id="simCanvas" width="420" height="420"></canvas>
        <div class="desc">青: 銀イオン / 赤: 還元剤 / 白: 析出銀</div>
    </div>

    <div class="panel">
        <div>透過率変化</div>
        <canvas id="graphCanvas" width="420" height="420"></canvas>
        <div class="desc">透過率(%) vs 経過時間(s)</div>
    </div>
</div>

<div class="controls">
    <div class="control-group">
        <label>還元剤濃度</label>
        <input type="range" id="conc" min="0.01" max="0.10" step="0.01" value="0.04">
        <div><span id="concVal">0.04</span> mol/L</div>
        <div class="desc">実験条件に合わせて 0.01〜0.10 mol/L</div>
    </div>

    <div class="control-group">
        <label>還元剤の種類</label>
        <select id="agent">
            <option value="0.25" data-agent="glucose">グルコース</option>
            <option value="1.5" data-agent="acetaldehyde">アセトアルデヒド</option>
            <option value="3.0" data-agent="formaldehyde">ホルムアルデヒド</option>
        </select>
        <div class="desc">値は反応速度係数の相対値</div>
    </div>

    <button id="startBtn">シミュレーション開始</button>
    <button id="resetBtn">リセット</button>
</div>

<script>
const canvas = document.getElementById("simCanvas");
const ctx = canvas.getContext("2d");
const graphCanvas = document.getElementById("graphCanvas");
const gctx = graphCanvas.getContext("2d");

const DT = 0.016;
const MAX_TIME = 40;   // ← 40秒
const WALL_MARGIN = 12;
const TRANSMIT_ALPHA = 0.018;
const KM = 80;

const experimental = {
    glucose: {
        0.01:18.5, 0.02:14.0, 0.03:12.7, 0.04:12.0, 0.05:15.7,
        0.06:9.0, 0.07:10.2, 0.08:7.8, 0.09:8.5, 0.10:8.0
    },
    acetaldehyde: {
        0.01:3.1, 0.02:2.0, 0.03:2.0, 0.04:1.5, 0.05:1.0,
        0.06:0.9, 0.07:0.9, 0.08:0.9, 0.09:0.9, 0.10:0.9
    },
    formaldehyde: {
        0.01:2.2, 0.02:1.0, 0.03:1.0, 0.04:0.9, 0.05:0.9,
        0.06:0.9, 0.07:0.9, 0.08:0.2, 0.09:0.2, 0.10:0.2
    }
};

let particles = [];
let silverWall = [];
let history = [];
let timeHistory = [];

let running = false;
let startTime;
let animationId;
let firstDepositTime = null;

class Particle{
    constructor(type){
        this.type = type;
        this.active = true;
        this.radius = type === "Ag" ? 2.5 : 2;
        this.x = 40 + Math.random()*340;
        this.y = 40 + Math.random()*340;
        this.vx = (Math.random()-0.5)*2;
        this.vy = (Math.random()-0.5)*2;
    }

    update(){
        if(!this.active) return;

        this.vx += (Math.random()-0.5)*0.06;
        this.vy += (Math.random()-0.5)*0.06;

        const vmax = 2;
        this.vx = Math.max(-vmax, Math.min(vmax,this.vx));
        this.vy = Math.max(-vmax, Math.min(vmax,this.vy));

        this.x += this.vx;
        this.y += this.vy;

        if(this.x < 15){ this.x = 15; this.vx *= -1; }
        if(this.x > 405){ this.x = 405; this.vx *= -1; }
        if(this.y < 15){ this.y = 15; this.vy *= -1; }
        if(this.y > 405){ this.y = 405; this.vy *= -1; }
    }

    draw(){
        if(!this.active) return;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.fillStyle = this.type === "Ag" ? "#00d9ff" : "#ff5a36";
        ctx.fill();
    }
}

function getExpTime(){
    const conc = parseFloat(document.getElementById("conc").value).toFixed(2);
    const agentKey = document.querySelector("#agent option:checked").dataset.agent;
    const val = experimental[agentKey][conc];
    return val ?? null;
}

function init(){
    particles = [];
    silverWall = [];
    history = [];
    timeHistory = [];
    firstDepositTime = null;

    const conc = parseFloat(document.getElementById("conc").value);
    const agCount = 150;
    const redCount = Math.min(350, Math.floor(conc*2500));

    for(let i=0;i<agCount;i++) particles.push(new Particle("Ag"));
    for(let i=0;i<redCount;i++) particles.push(new Particle("Red"));

    const exp = getExpTime();
    document.getElementById("expTime").innerText = exp ? exp.toFixed(1) : "—";
    document.getElementById("startTime").innerText = "—";

    draw();
    drawGraph();
}

function draw(){
    ctx.clearRect(0,0,420,420);

    ctx.strokeStyle = "#666";
    ctx.lineWidth = 8;
    ctx.strokeRect(10,10,400,400);

    silverWall.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x, s.y, 3, 0, Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.shadowBlur = 5;
        ctx.shadowColor = "white";
        ctx.fill();
        ctx.shadowBlur = 0;
    });

    particles.forEach(p=>p.draw());
}

function drawGraph(){
    gctx.clearRect(0,0,420,420);

    const left = 45;
    const right = 410;
    const top = 15;
    const bottom = 400;
    const width = right - left;
    const height = bottom - top;

    gctx.strokeStyle = "#444";
    gctx.lineWidth = 1;
    gctx.beginPath();
    gctx.moveTo(left, top);
    gctx.lineTo(left, bottom);
    gctx.lineTo(right, bottom);
    gctx.stroke();

    gctx.fillStyle = "#aaa";
    gctx.font = "12px sans-serif";

    const yTicks = 5;
    for(let i=0;i<=yTicks;i++){
        const v = (i/yTicks)*100;
        const y = bottom - (i/yTicks)*height;
        gctx.fillText(v.toFixed(0), 8, y+4);
        gctx.beginPath();
        gctx.moveTo(left-4, y);
        gctx.lineTo(left, y);
        gctx.stroke();
    }

    const xTicks = 5;
    for(let i=0;i<=xTicks;i++){
        const v = (i/xTicks)*MAX_TIME;
        const x = left + (i/xTicks)*width;
        gctx.fillText(v.toFixed(0), x-6, bottom+15);
        gctx.beginPath();
        gctx.moveTo(x, bottom);
        gctx.lineTo(x, bottom+4);
        gctx.stroke();
    }

    gctx.fillText("透過率(%)", 5, 15);
    gctx.fillText("時間(s)", right-50, bottom+15);

    if(history.length < 2) return;

    gctx.strokeStyle = "#00d9ff";
    gctx.lineWidth = 2;
    gctx.beginPath();

    history.forEach((v,i)=>{
        const t = timeHistory[i];
        const x = left + (t/MAX_TIME)*width;
        const y = bottom - (v/100)*height;
        if(i===0) gctx.moveTo(x,y);
        else gctx.lineTo(x,y);
    });

    gctx.stroke();

    const exp = getExpTime();
    if(exp){
        const x = left + (exp/MAX_TIME)*width;
        gctx.strokeStyle = "#ffcc00";
        gctx.beginPath();
        gctx.moveTo(x, top);
        gctx.lineTo(x, bottom);
        gctx.stroke();
    }
}

function loop(){
    if(!running) return;

    const now = (performance.now()-startTime)/1000;
    document.getElementById("timer").innerText = now.toFixed(2);

    const kBase = parseFloat(document.getElementById("agent").value);

    let activeRed = 0;
    let activeAg = 0;

    particles.forEach(p=>{
        if(p.active && p.type==="Red") activeRed++;
        if(p.active && p.type==="Ag") activeAg++;
    });

    const kEff = kBase * activeRed / (KM + activeRed);
    const reactionProb = 1 - Math.exp(-kEff * DT);

    for(let i=0;i<particles.length;i++){
        const p = particles[i];

        if(p.type === "Ag" && p.active){
            p.update();

            const nearWall =
                p.x < 10 + WALL_MARGIN ||
                p.x > 410 - WALL_MARGIN ||
                p.y < 10 + WALL_MARGIN ||
                p.y > 410 - WALL_MARGIN;

            if(nearWall){
                for(let j=0;j<particles.length;j++){
                    const r = particles[j];
                    if(r.type === "Red" && r.active){
                        const dist = Math.hypot(p.x-r.x, p.y-r.y);
                        if(dist < 10 && Math.random() < reactionProb){ // ← dist < 10
                            p.active = false;
                            r.active = false;
                            silverWall.push({x:p.x, y:p.y});

                            if(firstDepositTime === null){
                                firstDepositTime = now;
                                document.getElementById("startTime").innerText = now.toFixed(2);
                                document.getElementById("status").innerText = "析出開始";
                            }
                            break;
                        }
                    }
                }
            }
        }else if(p.type === "Red" && p.active){
            p.update();
        }
    }

    const trans = 100*Math.exp(-TRANSMIT_ALPHA*silverWall.length);
    document.getElementById("trans").innerText = trans.toFixed(1);

    history.push(trans);
    timeHistory.push(now);
    document.getElementById("agCount").innerText = activeAg;

    draw();
    drawGraph();

    if(now > MAX_TIME){
        running = false;
        document.getElementById("status").innerText = "終了";
    }else{
        animationId = requestAnimationFrame(loop);
    }
}

document.getElementById("startBtn").onclick = ()=>{
    if(running) return;
    init();
    running = true;
    startTime = performance.now();
    document.getElementById("status").innerText = "反応進行中";
    loop();
};

document.getElementById("resetBtn").onclick = ()=>{
    running = false;
    cancelAnimationFrame(animationId);
    init();
    document.getElementById("timer").innerText = "0.00";
    document.getElementById("trans").innerText = "100.0";
    document.getElementById("status").innerText = "待機中";
};

document.getElementById("conc").oninput = (e)=>{
    document.getElementById("concVal").innerText = parseFloat(e.target.value).toFixed(2);
    init();
};

document.getElementById("agent").onchange = ()=>{
    init();
};

init();
</script>

</body>
</html>
